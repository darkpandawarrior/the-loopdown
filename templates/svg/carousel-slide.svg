<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display','Helvetica Neue',sans-serif">
  <!-- The Loopdown carousel slide (LinkedIn 4:5). Placeholders:
       {{ACCENT}} {{KICKER}} {{HEAD_1..3}} {{BODY_1..5}} {{PAGEN}} {{PAGES}} {{BRAND}} {{HANDLE}} {{ARROW}} -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#12161d"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect x="0" y="0" width="14" height="1350" fill="{{ACCENT}}"/>

  <!-- kicker -->
  <text x="80" y="150" fill="{{ACCENT}}" font-family="'SF Mono',Menlo,monospace" font-size="30" letter-spacing="4">// {{KICKER}}</text>

  <!-- headline (up to 3 lines) -->
  <text x="80" y="330" fill="#e6edf3" font-size="82" font-weight="800" letter-spacing="-1">{{HEAD_1}}</text>
  <text x="80" y="430" fill="#e6edf3" font-size="82" font-weight="800" letter-spacing="-1">{{HEAD_2}}</text>
  <text x="80" y="530" fill="{{ACCENT}}" font-size="82" font-weight="800" letter-spacing="-1">{{HEAD_3}}</text>

  <!-- body (up to 5 lines) -->
  <text x="82" y="700" fill="#adbac7" font-size="42" font-weight="400">{{BODY_1}}</text>
  <text x="82" y="768" fill="#adbac7" font-size="42" font-weight="400">{{BODY_2}}</text>
  <text x="82" y="836" fill="#adbac7" font-size="42" font-weight="400">{{BODY_3}}</text>
  <text x="82" y="904" fill="#adbac7" font-size="42" font-weight="400">{{BODY_4}}</text>
  <text x="82" y="972" fill="#adbac7" font-size="42" font-weight="400">{{BODY_5}}</text>

  <!-- footer -->
  <rect x="80" y="1210" width="920" height="2" fill="#21262d"/>
  <circle cx="94" cy="1260" r="13" fill="none" stroke="{{ACCENT}}" stroke-width="3"/>
  <circle cx="94" cy="1260" r="5" fill="{{ACCENT}}"/>
  <text x="122" y="1270" fill="#e6edf3" font-family="'SF Mono',Menlo,monospace" font-size="30" font-weight="600">{{BRAND}}</text>
  <text x="80" y="1312" fill="#6e7681" font-family="'SF Mono',Menlo,monospace" font-size="26">{{HANDLE}}</text>
  <text x="1000" y="1270" fill="{{ACCENT}}" font-family="'SF Mono',Menlo,monospace" font-size="34" font-weight="700" text-anchor="end">{{PAGEN}} / {{PAGES}}</text>
  <text x="1000" y="1312" fill="#6e7681" font-family="'SF Mono',Menlo,monospace" font-size="26" text-anchor="end">{{ARROW}}</text>
</svg>
